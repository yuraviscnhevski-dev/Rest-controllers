<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f8f9fa;
    }
    .sidebar {
      min-width: 200px;
      max-width: 200px;
      background-color: #fff;
      border-right: 1px solid #dee2e6;
      padding-top: 20px;
    }
    .sidebar .nav-link {
      border-radius: 0;
    }
    .sidebar .nav-link.active {
      background-color: #0d6efd;
      color: #fff;
    }
    .sidebar .nav-link:not(.active) {
      color: #000;
    }
    .sidebar .nav-link:not(.active):hover {
      color: #0d6efd;
    }
    .content-wrapper {
      padding: 25px 30px;
    }
    .page-title {
      font-size: 32px;
      font-weight: 400;
      margin-bottom: 20px;
      color: #343a40;
    }
    .card-header-tabs {
      margin-bottom: -1px;
    }

    /* Стили для модальных окон (общие для удаления и редактирования) */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1050;
    }
    .delete-modal {
      background-color: #fff;
      border-radius: 4px;
      width: 500px;
      max-width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .delete-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid #dee2e6;
    }
    .delete-modal-header h5 {
      margin: 0;
      font-size: 18px;
      font-weight: 500;
      color: #333;
    }
    .btn-close-custom {
      background: none;
      border: none;
      font-size: 28px;
      line-height: 1;
      color: #666;
      cursor: pointer;
      padding: 0;
      text-decoration: none;
    }
    .btn-close-custom:hover {
      color: #333;
    }
    .delete-modal-body {
      padding: 20px;
    }
    .form-group-center {
      margin-bottom: 15px;
      text-align: center;
    }
    .form-label-bold {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      color: #333;
    }
    .form-input-narrow {
      width: 250px;
      margin: 0 auto;
      text-align: left;
    }
    .delete-modal-footer {
      padding: 15px 20px;
      border-top: 1px solid #dee2e6;
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    /* Для полей на всю ширину внутри модалки (альтернатива) */
    .modal-field {
      margin-bottom: 15px;
    }
    .modal-field label {
      font-weight: 600;
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <div class="d-flex justify-content-between w-100 align-items-center">
        <span class="navbar-text text-white">
            <span th:text="${currentUser.email}">admin@mail.ru</span>
            <span> with roles: </span>
            <span th:text="${#strings.listJoin(currentUser.roles.![#strings.replace(name,'ROLE_','')], ' ')}">ADMIN USER</span>
        </span>
    <form th:action="@{/logout}" method="post" class="mb-0">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
    </form>
  </div>
</nav>

<div class="d-flex">
  <div class="sidebar">
    <nav class="nav flex-column nav-pills">
      <a class="nav-link active" aria-current="page" href="/admin">Admin</a>
      <a class="nav-link" href="/user">User</a>
    </nav>
  </div>

  <div class="flex-grow-1 content-wrapper">
    <h1 class="page-title">Admin panel</h1>

    <div class="card">
      <div class="card-header pb-0">
        <ul class="nav nav-tabs card-header-tabs">
          <li class="nav-item">
            <a class="nav-link active" href="/admin">Users table</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/admin/new">New User</a>
          </li>
        </ul>
      </div>
      <div class="card-body pt-3">
        <h5 class="card-title mb-3">All users</h5>
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
              <th scope="col">ID</th>
              <th scope="col">First Name</th>
              <th scope="col">Last Name</th>
              <th scope="col">Age</th>
              <th scope="col">Email</th>
              <th scope="col">Role</th>
              <th scope="col">Edit</th>
              <th scope="col">Delete</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
              <td th:text="${user.id}">2</td>
              <td th:text="${user.firstName}">admin</td>
              <td th:text="${user.lastName}">admin</td>
              <td th:text="${user.age}">35</td>
              <td th:text="${user.email}">admin@mail.ru</td>
              <td>
                                <span th:if="${user.roles != null}" th:each="role, iterStat : ${user.roles}">
                                    <span th:text="${#strings.replace(role.name, 'ROLE_', '')}">ADMIN</span>
                                    <span th:if="${!iterStat.last}"> </span>
                                </span>
              </td>
              <td>
                <a th:href="@{/admin/edit/{id}(id=${user.id})}" class="btn btn-info btn-sm text-white">Edit</a>
              </td>
              <td>
                <a th:href="@{/admin/delete/{id}(id=${user.id})}" class="btn btn-danger btn-sm">Delete</a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно удаления (остаётся без изменений) -->
<div th:if="${showDeleteModal}" class="modal-overlay">
  <div class="delete-modal">
    <div class="delete-modal-header">
      <h5>Delete user</h5>
      <a th:href="@{/admin}" class="btn-close-custom">&times;</a>
    </div>
    <div class="delete-modal-body">
      <div class="form-group-center">
        <label class="form-label-bold">ID</label>
        <input type="text" class="form-control form-input-narrow" th:value="${userToDelete.id}" disabled>
      </div>
      <div class="form-group-center">
        <label class="form-label-bold">First name</label>
        <input type="text" class="form-control form-input-narrow" th:value="${userToDelete.firstName}" disabled>
      </div>
      <div class="form-group-center">
        <label class="form-label-bold">Last name</label>
        <input type="text" class="form-control form-input-narrow" th:value="${userToDelete.lastName}" disabled>
      </div>
      <div class="form-group-center">
        <label class="form-label-bold">Age</label>
        <input type="text" class="form-control form-input-narrow" th:value="${userToDelete.age}" disabled>
      </div>
      <div class="form-group-center">
        <label class="form-label-bold">Email</label>
        <input type="text" class="form-control form-input-narrow" th:value="${userToDelete.email}" disabled>
      </div>
      <div class="form-group-center">
        <label class="form-label-bold">Role</label>
        <select class="form-select form-input-narrow" multiple disabled size="2">
          <option th:each="role : ${userToDelete.roles}"
                  th:value="${role.name}"
                  th:text="${#strings.replace(role.name, 'ROLE_', '')}"
                  selected>ADMIN</option>
        </select>
      </div>
    </div>
    <div class="delete-modal-footer">
      <a th:href="@{/admin}" class="btn btn-secondary">Close</a>
      <form th:action="@{/admin/delete/{id}(id=${userToDelete.id})}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="btn btn-danger">Delete</button>
      </form>
    </div>
  </div>
</div>

<!-- Модальное окно редактирования (новое) -->
<div th:if="${showEditModal}" class="modal-overlay">
  <div class="delete-modal" style="width: 550px;"> <!-- чуть шире для удобства -->
    <div class="delete-modal-header">
      <h5>Edit user</h5>
      <a th:href="@{/admin}" class="btn-close-custom">&times;</a>
    </div>
    <div class="delete-modal-body">
      <form th:action="@{/admin/edit/{id}(id=${editUser.id})}" th:object="${editUser}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" th:field="*{id}" />

        <!-- Поля формы (можно оставить центрированными или сделать на всю ширину) -->
        <div class="form-group-center">
          <label class="form-label-bold">ID</label>
          <input type="text" class="form-control form-input-narrow" th:value="${editUser.id}" disabled>
        </div>

        <div class="form-group-center">
          <label class="form-label-bold">First name</label>
          <input type="text" th:field="*{firstName}" class="form-control form-input-narrow" required>
        </div>

        <div class="form-group-center">
          <label class="form-label-bold">Last name</label>
          <input type="text" th:field="*{lastName}" class="form-control form-input-narrow" required>
        </div>

        <div class="form-group-center">
          <label class="form-label-bold">Age</label>
          <input type="number" th:field="*{age}" class="form-control form-input-narrow" required>
        </div>

        <div class="form-group-center">
          <label class="form-label-bold">Email</label>
          <input type="email" th:field="*{email}" class="form-control form-input-narrow" required>
        </div>

        <div class="form-group-center">
          <label class="form-label-bold">Password</label>
          <input type="password" th:field="*{password}" class="form-control form-input-narrow"
                 placeholder="Leave blank to keep current">
        </div>

        <div class="form-group-center">
          <label class="form-label-bold">Role</label>
          <select th:field="*{roles}" multiple class="form-select form-input-narrow">
            <option th:each="role : ${allRoles}"
                    th:value="${role.id}"
                    th:text="${#strings.replace(role.name, 'ROLE_', '')}"
                    th:selected="${editUser.roles.contains(role)}">
            </option>
          </select>
        </div>

        <div class="delete-modal-footer">
          <a th:href="@{/admin}" class="btn btn-secondary">Close</a>
          <button type="submit" class="btn btn-primary">Edit</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Bootstrap JS для интерактивных компонентов (не обязателен, но может пригодиться) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
