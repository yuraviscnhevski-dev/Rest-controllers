<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Admin panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .sidebar { min-width: 200px; max-width: 200px; background-color: #fff; border-right: 1px solid #dee2e6; padding-top: 20px; }
    .sidebar .nav-link { border-radius: 0; }
    .sidebar .nav-link.active { background-color: #0d6efd; color: #fff; }
    .content-wrapper { padding: 25px 30px; }
    .page-title { font-size: 32px; font-weight: 400; margin-bottom: 20px; color: #343a40; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <div class="d-flex justify-content-between w-100 align-items-center">
    <!-- Информация о текущем пользователе через Spring Security -->
    <span class="navbar-text text-white">
            <span sec:authentication="name"></span> with roles:
            <span sec:authentication="principal.authorities"></span>
        </span>
    <form th:action="@{/logout}" method="post" class="mb-0">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
    </form>
  </div>
</nav>

<div class="d-flex">
  <div class="sidebar">
    <nav class="nav flex-column nav-pills">
      <a class="nav-link active" href="/admin">Admin</a>
      <a class="nav-link" href="/user">User</a>
    </nav>
  </div>

  <div class="flex-grow-1 content-wrapper">
    <h1 class="page-title">Admin panel</h1>

    <div class="card">
      <div class="card-header pb-0">
        <ul class="nav nav-tabs card-header-tabs">
          <li class="nav-item">
            <a class="nav-link active" href="#">Users table</a>
          </li>
          <li class="nav-item">
            <button class="nav-link" style="border: none; background: none; color: #0d6efd;" onclick="openAddModal()">New User</button>
          </li>
        </ul>
      </div>
      <div class="card-body pt-3">
        <h5 class="card-title mb-3">All users</h5>
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle mb-0" id="users-table">
            <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Age</th>
              <th>Email</th>
              <th>Role</th>
              <th>Edit</th>
              <th>Delete</th>
            </tr>
            </thead>
            <tbody id="users-table-body">
            <!-- данные подставятся через JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно добавления пользователя -->
<div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add new user</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="addUserForm">
          <div class="mb-3">
            <label class="form-label">First name</label>
            <input type="text" class="form-control" name="firstName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Last name</label>
            <input type="text" class="form-control" name="lastName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" name="age" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Roles</label>
            <select multiple class="form-select" name="roles" id="addRolesSelect"></select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveUser()">Add</button>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно редактирования пользователя -->
<div class="modal fade" id="editUserModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit user</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="editUserForm">
          <input type="hidden" name="id" id="editId">
          <div class="mb-3">
            <label class="form-label">First name</label>
            <input type="text" class="form-control" name="firstName" id="editFirstName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Last name</label>
            <input type="text" class="form-control" name="lastName" id="editLastName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" name="age" id="editAge" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" id="editEmail" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password (leave blank to keep current)</label>
            <input type="password" class="form-control" name="password" id="editPassword">
          </div>
          <div class="mb-3">
            <label class="form-label">Roles</label>
            <select multiple class="form-select" name="roles" id="editRolesSelect"></select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="updateUser()">Save changes</button>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно подтверждения удаления -->
<div class="modal fade" id="deleteUserModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirm deletion</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete user <span id="deleteUserName"></span>?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" onclick="deleteUser()">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS и наш скрипт -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Глобальные переменные
  let currentUserIdForDelete = null;
  let currentUserIdForEdit = null;
  let allRoles = [];

  // CSRF токен из cookie
  function getCsrfToken() {
    const cookies = document.cookie.split(';');
    for (let cookie of cookies) {
      const [name, value] = cookie.trim().split('=');
      if (name === 'XSRF-TOKEN') {
        return value;
      }
    }
    return null;
  }

  const csrfToken = getCsrfToken();
  const headers = {
    'Content-Type': 'application/json',
    'X-XSRF-TOKEN': csrfToken
  };

  // Загрузка всех пользователей
  async function loadUsers() {
    const response = await fetch('/api/admin/users');
    const users = await response.json();
    const tbody = document.getElementById('users-table-body');
    tbody.innerHTML = '';
    users.forEach(user => {
      const rolesStr = user.roles.map(r => r.name.replace('ROLE_', '')).join(' ');
      const row = document.createElement('tr');
      row.innerHTML = `
                <td>${user.id}</td>
                <td>${user.firstName}</td>
                <td>${user.lastName}</td>
                <td>${user.age}</td>
                <td>${user.email}</td>
                <td>${rolesStr}</td>
                <td><button class="btn btn-info btn-sm" onclick="openEditModal(${user.id})">Edit</button></td>
                <td><button class="btn btn-danger btn-sm" onclick="openDeleteModal(${user.id}, '${user.firstName} ${user.lastName}')">Delete</button></td>
            `;
      tbody.appendChild(row);
    });
  }

  // Загрузка всех ролей (для селектов)
  async function loadRoles() {
    const response = await fetch('/api/admin/roles');
    allRoles = await response.json();
  }

  // Заполнить селект ролями (общий для добавления и редактирования)
  function populateRolesSelect(selectId, selectedRoleIds = []) {
    const select = document.getElementById(selectId);
    select.innerHTML = '';
    allRoles.forEach(role => {
      const option = document.createElement('option');
      option.value = role.id;
      option.textContent = role.name.replace('ROLE_', '');
      if (selectedRoleIds.includes(role.id)) {
        option.selected = true;
      }
      select.appendChild(option);
    });
  }

  // Открыть модальное окно добавления
  async function openAddModal() {
    await loadRoles(); // убедимся, что роли загружены
    populateRolesSelect('addRolesSelect');
    document.getElementById('addUserForm').reset();
    new bootstrap.Modal(document.getElementById('addUserModal')).show();
  }

  // Сохранить нового пользователя
  async function saveUser() {
    const form = document.getElementById('addUserForm');
    const formData = new FormData(form);
    const user = {
      firstName: formData.get('firstName'),
      lastName: formData.get('lastName'),
      age: parseInt(formData.get('age')),
      email: formData.get('email'),
      password: formData.get('password')
    };
    const roleIds = Array.from(formData.getAll('roles')).map(id => parseInt(id));
    const url = `/api/admin/users?roles=${roleIds.join(',')}`;
    const response = await fetch(url, {
      method: 'POST',
      headers: headers,
      body: JSON.stringify(user)
    });
    if (response.ok) {
      bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
      await loadUsers();
    } else {
      alert('Error adding user');
    }
  }

  // Открыть модальное окно редактирования
  async function openEditModal(id) {
    await loadRoles();
    const response = await fetch(`/api/admin/users/${id}`);
    const user = await response.json();
    currentUserIdForEdit = id;
    document.getElementById('editId').value = user.id;
    document.getElementById('editFirstName').value = user.firstName;
    document.getElementById('editLastName').value = user.lastName;
    document.getElementById('editAge').value = user.age;
    document.getElementById('editEmail').value = user.email;
    document.getElementById('editPassword').value = ''; // очищаем пароль
    const selectedRoleIds = user.roles.map(r => r.id);
    populateRolesSelect('editRolesSelect', selectedRoleIds);
    new bootstrap.Modal(document.getElementById('editUserModal')).show();
  }

  // Обновить пользователя
  async function updateUser() {
    const form = document.getElementById('editUserForm');
    const formData = new FormData(form);
    const user = {
      firstName: formData.get('firstName'),
      lastName: formData.get('lastName'),
      age: parseInt(formData.get('age')),
      email: formData.get('email')
    };
    const password = formData.get('password');
    if (password) {
      user.password = password;
    }
    const roleIds = Array.from(formData.getAll('roles')).map(id => parseInt(id));
    const url = `/api/admin/users/${currentUserIdForEdit}?roles=${roleIds.join(',')}`;
    const response = await fetch(url, {
      method: 'PUT',
      headers: headers,
      body: JSON.stringify(user)
    });
    if (response.ok) {
      bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
      await loadUsers();
    } else {
      alert('Error updating user');
    }
  }

  // Открыть модальное окно удаления
  function openDeleteModal(id, fullName) {
    currentUserIdForDelete = id;
    document.getElementById('deleteUserName').textContent = fullName;
    new bootstrap.Modal(document.getElementById('deleteUserModal')).show();
  }

  // Удалить пользователя
  async function deleteUser() {
    const response = await fetch(`/api/admin/users/${currentUserIdForDelete}`, {
      method: 'DELETE',
      headers: headers
    });
    if (response.ok) {
      bootstrap.Modal.getInstance(document.getElementById('deleteUserModal')).hide();
      await loadUsers();
    } else {
      alert('Error deleting user');
    }
  }

  // Инициализация при загрузке страницы
  window.onload = async function() {
    await loadUsers();
    await loadRoles(); // можно заранее загрузить роли
  };
</script>
</body>
</html>
