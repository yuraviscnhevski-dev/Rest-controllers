<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Delete user</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: rgba(0,0,0,0.5);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .modal-dialog {
      width: 500px;
      margin: 0;
    }
    .modal-content {
      border: none;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .modal-header {
      background-color: #fff;
      border-bottom: 1px solid #dee2e6;
      padding: 15px 20px;
    }
    .modal-header h5 {
      margin: 0;
      font-size: 18px;
      font-weight: 500;
      color: #333;
    }
    .btn-close {
      background: none;
      border: none;
      font-size: 24px;
      line-height: 1;
      color: #666;
      cursor: pointer;
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-close:hover {
      color: #333;
    }
    .modal-body {
      padding: 20px;
    }
    .form-group {
      margin-bottom: 15px;
      text-align: center;
    }
    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      color: #333;
    }
    .form-control, .form-select {
      width: 200px;
      margin: 0 auto;
      text-align: left;
      background-color: #fff;
      border: 1px solid #ced4da;
    }
    .form-control:disabled, .form-select:disabled {
      background-color: #fff;
      opacity: 1;
    }
    .modal-footer {
      padding: 15px 20px;
      border-top: 1px solid #dee2e6;
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .btn-secondary {
      background-color: #6c757d;
      border-color: #6c757d;
      min-width: 80px;
    }
    .btn-danger {
      background-color: #dc3545;
      border-color: #dc3545;
      min-width: 80px;
    }
  </style>
</head>
<body>
<div class="modal-dialog">
  <div class="modal-content">
    <div class="modal-header">
      <h5>Delete user</h5>
      <a th:href="@{/admin}" class="btn-close">&times;</a>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">ID</label>
        <input type="text" class="form-control" th:value="${user.id}" disabled>
      </div>
      <div class="form-group">
        <label class="form-label">First name</label>
        <input type="text" class="form-control" th:value="${user.firstName}" disabled>
      </div>
      <div class="form-group">
        <label class="form-label">Last name</label>
        <input type="text" class="form-control" th:value="${user.lastName}" disabled>
      </div>
      <div class="form-group">
        <label class="form-label">Age</label>
        <input type="text" class="form-control" th:value="${user.age}" disabled>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="text" class="form-control" th:value="${user.email}" disabled>
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-select" multiple disabled size="2">
          <option th:each="role : ${user.roles}"
                  th:value="${role.name}"
                  th:text="${#strings.replace(role.name, 'ROLE_', '')}"
                  selected>ADMIN</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <a th:href="@{/admin}" class="btn btn-secondary">Close</a>
      <form th:action="@{/admin/delete/{id}(id=${user.id})}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="btn btn-danger">Delete</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
