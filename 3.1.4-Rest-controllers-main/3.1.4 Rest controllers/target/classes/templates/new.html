<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Add new user</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .sidebar {
      min-width: 200px;
      max-width: 200px;
      background-color: #fff;
      border-right: 1px solid #dee2e6;
      padding-top: 20px;
    }
    .sidebar .nav-link {
      border-radius: 0;
    }
    .sidebar .nav-link.active {
      background-color: #0d6efd;
      color: #fff;
    }
    .sidebar .nav-link:not(.active) {
      color: #000;
    }
    .sidebar .nav-link:not(.active):hover {
      color: #0d6efd;
    }
    .content-wrapper {
      padding: 25px 30px;
    }
    .page-title {
      font-size: 32px;
      font-weight: 400;
      margin-bottom: 20px;
      color: #343a40;
    }
    .yellow-input {
      background-color: #fff3cd;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <div class="d-flex justify-content-between w-100 align-items-center">
    <span class="navbar-text text-white">
      <span th:text="${currentUser.email}">admin@mail.ru</span>
      <span> with roles: </span>
      <span th:text="${#strings.listJoin(currentUser.roles, ' ')}">ADMIN USER</span>
    </span>
    <form th:action="@{/logout}" method="post" class="mb-0">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
    </form>
  </div>
</nav>

<div class="d-flex">
  <div class="sidebar">
    <nav class="nav flex-column nav-pills">
      <a class="nav-link active" href="/admin">Admin</a>
      <a class="nav-link" href="/user">User</a>
    </nav>
  </div>

  <div class="flex-grow-1 content-wrapper">
    <h1 class="page-title">Admin panel</h1>

    <div class="card">
      <div class="card-header pb-0">
        <ul class="nav nav-tabs card-header-tabs">
          <li class="nav-item">
            <a class="nav-link" href="/admin">Users table</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="/admin/new">New User</a>
          </li>
        </ul>
      </div>
      <div class="card-body">
        <h5 class="card-title mb-3">Add new user</h5>

        <form th:action="@{/admin/new}" th:object="${user}" method="post" class="w-50">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <div class="mb-3">
            <label class="form-label">First name</label>
            <input type="text" th:field="*{firstName}" class="form-control yellow-input" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Last name</label>
            <input type="text" th:field="*{lastName}" class="form-control yellow-input" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" th:field="*{age}" class="form-control yellow-input" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control yellow-input" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Role</label>
            <select name="roles" multiple class="form-select">
              <option th:each="role : ${allRoles}"
                      th:value="${role.id}"
                      th:text="${role.name.replace('ROLE_','')}"></option>
            </select>
          </div>

          <button type="submit" class="btn btn-success">Add new user</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
