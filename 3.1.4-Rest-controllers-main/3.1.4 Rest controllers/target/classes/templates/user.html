<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User information-page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .sidebar {
            min-width: 200px;
            max-width: 200px;
            background-color: #fff;
            border-right: 1px solid #dee2e6;
            padding-top: 20px;
        }
        .sidebar .nav-link {
            border-radius: 0;
        }
        .sidebar .nav-link.active {
            background-color: #0d6efd;
            color: #fff;
        }
        .content-wrapper {
            padding: 25px 30px;
        }
        .page-title {
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 20px;
            color: #343a40;
        }
        .card {
            border: none;
            border-radius: 0;
            box-shadow: none;
        }
        .card-header {
            background-color: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }
        .card-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 500;
        }
        .info-table {
            width: 100%;
        }
        .info-table th {
            background-color: #343a40;
            color: #fff;
        }
        .role-badge {
            display: inline-block;
            background-color: #0d6efd;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <div class="d-flex justify-content-between w-100 align-items-center">
        <span class="navbar-text text-white">
            <span th:text="${user.email}"></span>
            <span> with roles: </span>
            <span th:text="${#strings.listJoin(user.roles, ' ')}"></span>
        </span>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="d-flex">
    <div class="sidebar">
        <nav class="nav flex-column nav-pills">
            <a class="nav-link active" href="/user">User</a>
        </nav>
    </div>

    <div class="flex-grow-1 content-wrapper">
        <h1 class="page-title">User information-page</h1>

        <div class="card">
            <div class="card-header">
                <h3>About user</h3>
            </div>
            <div class="card-body p-0">
                <table class="table mb-0 info-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.firstName}"></td>
                        <td th:text="${user.lastName}"></td>
                        <td th:text="${user.age}"></td>
                        <td th:text="${user.email}"></td>
                        <td>
                                    <span th:each="role : ${user.roles}" class="role-badge me-1"
                                          th:text="${role.name.replace('ROLE_','')}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
